<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRC Config Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="number"], input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            flex-grow: 1;
        }
        .value-display {
            min-width: 60px;
            text-align: right;
            font-family: monospace;
        }
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DRC Configuration</h1>
        <div id="controls" class="controls-grid">
            <!-- Controls will be injected here -->
        </div>
        <div class="actions">
            <button class="btn-success" onclick="updateOutput()">Update Output</button>
            <button class="btn-primary" onclick="saveConfig()">Save Settings</button>
        </div>
    </div>

    <div id="toast" class="toast">Action successful!</div>

    <script>
        const API_URL = 'http://localhost:8080';
        let currentConfig = {};
        let schema = [];

        async function init() {
            try {
                const [schemaRes, configRes] = await Promise.all([
                    fetch(`${API_URL}/schema`),
                    fetch(`${API_URL}/config`)
                ]);
                
                if (!schemaRes.ok || !configRes.ok) throw new Error('Failed to fetch data');

                schema = await schemaRes.json();
                currentConfig = await configRes.json();

                renderControls();
            } catch (err) {
                console.error('Error initializing:', err);
                showToast('Failed to connect to server', true);
            }
        }

        function renderControls() {
            const container = document.getElementById('controls');
            container.innerHTML = '';

            // Filter only significant items
            const significantItems = schema.filter(item => item.significant);

            significantItems.forEach(item => {
                const group = document.createElement('div');
                group.className = 'control-group';
                
                const label = document.createElement('label');
                label.htmlFor = item.name;
                label.textContent = item.name;
                group.appendChild(label);

                const value = currentConfig[item.name] !== undefined ? currentConfig[item.name] : '';

                if (item.min !== null && item.max !== null && item.min < item.max) {
                    // Use slider + number input for bounded values
                    const sliderContainer = document.createElement('div');
                    sliderContainer.className = 'slider-container';

                    const slider = document.createElement('input');
                    slider.type = 'range';
                    slider.id = `${item.name}-slider`;
                    slider.min = item.min;
                    slider.max = item.max;
                    slider.step = item.type === 'int' ? '1' : '0.01';
                    slider.value = value;

                    const numInput = document.createElement('input');
                    numInput.type = 'number';
                    numInput.id = item.name;
                    numInput.min = item.min;
                    numInput.max = item.max;
                    numInput.step = item.type === 'int' ? '1' : '0.01';
                    numInput.value = value;
                    numInput.className = 'value-display';

                    // Sync slider and input
                    slider.addEventListener('input', (e) => {
                        numInput.value = e.target.value;
                        currentConfig[item.name] = item.type === 'int' ? parseInt(e.target.value) : parseFloat(e.target.value);
                    });
                    numInput.addEventListener('input', (e) => {
                        slider.value = e.target.value;
                        currentConfig[item.name] = item.type === 'int' ? parseInt(e.target.value) : parseFloat(e.target.value);
                    });

                    sliderContainer.appendChild(slider);
                    sliderContainer.appendChild(numInput);
                    group.appendChild(sliderContainer);
                } else {
                    // Use plain text/number input for unbounded
                    const input = document.createElement('input');
                    input.type = item.type === 'string' ? 'text' : 'number';
                    input.id = item.name;
                    if (item.type !== 'string') input.step = 'any';
                    input.value = value;

                    input.addEventListener('input', (e) => {
                        currentConfig[item.name] = item.type === 'int' ? parseInt(e.target.value) : 
                                                 item.type === 'float' || item.type === 'double' ? parseFloat(e.target.value) : 
                                                 e.target.value;
                    });
                    group.appendChild(input);
                }

                container.appendChild(group);
            });
        }

        async function saveConfig() {
            const significantItems = schema.filter(item => item.significant);
            const params = new URLSearchParams();
            
            significantItems.forEach(item => {
                if (currentConfig[item.name] !== undefined) {
                    params.append(item.name, currentConfig[item.name]);
                }
            });

            try {
                const res = await fetch(`${API_URL}/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params.toString()
                });

                if (res.ok) {
                    showToast('Settings saved successfully!');
                } else {
                    throw new Error('Failed to save');
                }
            } catch (err) {
                console.error(err);
                showToast('Error saving settings', true);
            }
        }

        async function updateOutput() {
            // First save config, then trigger update
            await saveConfig();
            
            try {
                const res = await fetch(`${API_URL}/update_output`, {
                    method: 'POST'
                });

                if (res.ok) {
                    showToast('Output recalculation triggered!');
                } else {
                    throw new Error('Failed to update output');
                }
            } catch (err) {
                console.error(err);
                showToast('Error triggering update', true);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? '#dc3545' : '#28a745';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
